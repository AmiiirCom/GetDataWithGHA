name: "Download Binance Data & Commit as ZIP Parts"

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install binance-historical-data pandas

      - name: Run download and split script
        run: python download_binance_data.py

      - name: List generated files (برای اشکال‌زدایی)
        run: |
          echo "فایل‌های موجود در ریشه:"
          ls -lah binance_data.part* 2>/dev/null || echo "هیچ پارتی یافت نشد"
          echo "فایل‌های باقیمانده data/raw:"
          ls -lah data/raw/ 2>/dev/null || echo "پوشه خالی است"

      - name: Commit and push if there are changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add binance_data.part* 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update Binance data (split to 50MB parts)"
            git push origin HEAD:main
          fi