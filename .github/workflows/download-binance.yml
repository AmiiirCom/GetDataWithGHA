name: Download Binance Historical Data

on:
  schedule:
    - cron: '0 0 * * *'      # هر روز ساعت 00:00 UTC
  workflow_dispatch:          # اجرای دستی از طریق GitHub UI

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install python-binance pandas dateparser

      - name: Run download script
        run: python download_binance_data.py
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}

      - name: Upload CSV files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: binance-csv-data
          path: data/raw/*.csv
          retention-days: 30