name: '📦 دانلود بایننس و ذخیره به صورت قطعات 50 مگابایتی (بدون LFS)'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 نصب وابستگی‌ها
        run: pip install binance-historical-data pandas

      - name: 📥 اجرای اسکریپت دانلود و تقسیم
        run: python download_binance_data.py

      - name: 📝 کامیت و پوش قطعات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add binance_data_split.part*
          if git diff --staged --quiet; then
            echo "هیچ تغییری وجود ندارد"
          else
            git commit -m "Add Binance data split parts (BTCUSDT 1h+15m) - $(date +%Y-%m-%d)"
            git push origin HEAD:main
          fi