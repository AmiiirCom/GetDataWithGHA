name: "Download Binance Data & Commit as ZIP Parts"

on:
  schedule:
    - cron: "0 0 1 * *"     # هر ماه یک بار (روز اول ماه) - می‌توانید تغییر دهید
  workflow_dispatch:          # قابلیت اجرای دستی

permissions:
  contents: write             # اجازه push به مخزن

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # برای دسترسی به تاریخچه کامل (اختیاری)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install binance-historical-data pandas

      - name: Run download and split script
        run: python download_binance_data.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add and commit ZIP parts
        run: |
          # فایل‌های پارت شده را به git اضافه می‌کنیم
          git add binance_data.z* binance_data.zip 2>/dev/null || true
          git add data/raw -f 2>/dev/null || true   # در صورت وجود فایل CSV اضافی
          # اگر تغییری وجود داشت commit کنید
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update Binance data (splitted to 50MB parts)"
            git push origin HEAD:main
          fi