name: "Download Binance Data"

on:
  schedule:
    - cron: "0 0 * * *"        # هر روز ساعت 00:00 UTC
  workflow_dispatch:             # قابلیت اجرای دستی

permissions:
  contents: read                 # فقط خواندن مخزن (برای آپلود آرتیفکت نیاز به write نیست)

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install binance-historical-data pandas

      - name: Run download script
        run: python download_binance_data.py

      - name: List all downloaded CSV files (برای اشکال‌زدایی)
        run: |
          echo "فایل‌های CSV پیدا شده:"
          find data/raw -name "*.csv" -type f

      - name: Upload artifacts (همه فایل‌های CSV)
        uses: actions/upload-artifact@v4
        with:
          name: binance-csv-data
          path: data/raw/**/*.csv        # الگوی بازگشتی برای همه CSV‌ها
          retention-days: 30