name: "Download Binance Data"

on:
  schedule:
    - cron: "0 0 * * *"     # هر روز ساعت 00:00 UTC اجرا شود
  workflow_dispatch:         # امکان اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install binance-historical-data pandas

      - name: Run download script
        run: python download_binance_data.py

      - name: Upload data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: binance-csv-data
          path: data/raw/*.csv
          retention-days: 30   # ذخیره فایل‌ها به مدت 30 روز در GitHub